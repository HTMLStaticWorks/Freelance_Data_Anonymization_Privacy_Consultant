<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | PrivacyIntel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="icon" type="image/svg+xml" href="assets/images/logo.svg">
    <style>
        body {
            background: radial-gradient(circle at top right, var(--secondary-bg), var(--primary-bg));
        }
        .register-card {
            width: 100%;
            max-width: 500px;
        }
    </style>
</head>
<body class="dark-mode auth-page">
    <!-- Top Right Toggles -->
    <div class="position-fixed top-0 end-0 p-3 d-flex gap-2" style="z-index: 1000;">
        <button class="btn btn-sm btn-outline-light" id="theme-toggle" title="Toggle Theme">
            <i class="bi bi-moon-stars"></i>
        </button>
        <button class="btn btn-sm btn-outline-light" id="rtl-toggle" title="Toggle RTL">
            <i class="bi bi-arrow-left-right"></i>
        </button>
    </div>

    <div class="register-card p-4 mx-auto">
        <div class="glass-card p-4">
            <div class="text-center mb-4">
                <a class="navbar-brand d-flex align-items-center justify-content-center mb-4" href="index.html">
                    <img src="assets/images/logo.svg" alt="PrivacyIntel Logo" class="me-2" style="width: 28px; height: 28px;">PRIVACY<span class="text-info">INTEL</span>
                </a>
                <h4 class="mt-2">Enterprise Registration</h4>
                <p class="text-muted small">Scale your privacy operations</p>
            </div>

            <form>
                <div class="mb-3">
                    <label class="form-label small">First Name</label>
                    <input type="text" class="form-control border-secondary p-3" placeholder="John" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small">Last Name</label>
                    <input type="text" class="form-control border-secondary p-3" placeholder="Doe" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small">Work Email</label>
                    <input type="email" class="form-control border-secondary p-3" placeholder="name@company.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small">Company Name</label>
                    <input type="text" class="form-control border-secondary p-3" placeholder="Acme Inc." required>
                </div>
                <div class="mb-4">
                    <label class="form-label small">Create Password</label>
                    <div class="input-group">
                        <input type="password" id="password" class="form-control border-secondary p-3" placeholder="••••••••" required>
                        <button class="btn btn-outline-secondary border-secondary px-3" type="button" id="togglePassword">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" id="terms" required>
                    <label class="form-check-label small text-muted" for="terms">
                        I agree to the <a href="#" class="text-info text-decoration-none hover-highlight fw-bold">Terms and Conditions</a> and Privacy Policy.
                    </label>
                </div>

                <button type="submit" class="btn btn-premium w-100 py-3 mb-4">Request Access</button>
            </form>

            <div class="d-flex align-items-center my-4">
                <hr class="flex-grow-1 border-secondary">
                <span class="px-3 text-muted small">OR SIGN UP WITH</span>
                <hr class="flex-grow-1 border-secondary">
            </div>

            <!-- Social Logins -->
            <div class="d-flex gap-3 mb-4">
                <button class="btn btn-outline-light w-100 social-btn py-2 d-flex align-items-center justify-content-center gap-2">
                    <i class="bi bi-google"></i> Google
                </button>
                <button class="btn btn-outline-light w-100 social-btn py-2 d-flex align-items-center justify-content-center gap-2">
                    <i class="bi bi-apple"></i> Apple
                </button>
            </div>

            <div class="text-center mt-4">
                <p class="small text-muted">Already have an account? <a href="login.html" class="text-info text-decoration-none fw-bold">Login</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        if (togglePassword && passwordInput) {
            togglePassword.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                const icon = togglePassword.querySelector('i');
                icon.classList.toggle('bi-eye');
                icon.classList.toggle('bi-eye-slash');
            });
        }
    </script>
</body>
</html>
