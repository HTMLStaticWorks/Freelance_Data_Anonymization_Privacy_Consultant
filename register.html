<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | PrivacyIntel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top right, var(--secondary-bg), var(--primary-bg));
        }
        .register-card {
            width: 100%;
            max-width: 500px;
        }
    </style>
</head>
<body class="dark-mode">
    <div class="register-card p-4">
        <div class="glass-card">
            <div class="text-center mb-4">
                <a href="index.html" class="navbar-brand">
                    <i class="bi bi-shield-lock-fill me-2 text-info"></i>PRIVACY<span>INTEL</span>
                </a>
                <h4 class="mt-4">Enterprise Registration</h4>
                <p class="text-muted small">Scale your privacy operations</p>
            </div>
            <form>
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label small">First Name</label>
                        <input type="text" class="form-control bg-dark border-secondary text-white" placeholder="John" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small">Last Name</label>
                        <input type="text" class="form-control bg-dark border-secondary text-white" placeholder="Doe" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label small">Work Email</label>
                    <input type="email" class="form-control bg-dark border-secondary text-white" placeholder="name@company.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small">Company Name</label>
                    <input type="text" class="form-control bg-dark border-secondary text-white" placeholder="Acme Inc." required>
                </div>
                <div class="mb-4">
                    <label class="form-label small">Create Password</label>
                    <input type="password" class="form-control bg-dark border-secondary text-white" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-premium w-100">Request Access</button>
                <div class="text-center mt-4">
                    <p class="small text-muted">Already have an account? <a href="login.html" class="text-info text-decoration-none">Login</a></p>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
