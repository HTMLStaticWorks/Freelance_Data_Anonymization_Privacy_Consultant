<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | PrivacyIntel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top right, var(--secondary-bg), var(--primary-bg));
        }
        .login-card {
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>
<body class="dark-mode">
    <div class="login-card p-4">
        <div class="glass-card">
            <div class="text-center mb-4">
                <a href="index.html" class="navbar-brand">
                    <i class="bi bi-shield-lock-fill me-2 text-info"></i>PRIVACY<span>INTEL</span>
                </a>
                <h4 class="mt-4">Welcome Back</h4>
                <p class="text-muted small">Enterprise Data Privacy Portal</p>
            </div>
            <form action="dashboard.html">
                <div class="mb-3">
                    <label class="form-label small">Email Address</label>
                    <input type="email" class="form-control bg-dark border-secondary text-white" placeholder="name@company.com" required>
                </div>
                <div class="mb-4">
                    <div class="d-flex justify-content-between">
                        <label class="form-label small">Password</label>
                        <a href="#" class="small text-info text-decoration-none">Forgot?</a>
                    </div>
                    <input type="password" class="form-control bg-dark border-secondary text-white" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-premium w-100">Sign In</button>
                <div class="text-center mt-4">
                    <p class="small text-muted">Don't have an account? <a href="register.html" class="text-info text-decoration-none">Contact Sales</a></p>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
